name: Build and deploy jemdoc site

on:
  push:
    branches: [main]
  workflow_dispatch:          # lets you trigger a build manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only the latest push matters for a static site: cancel any superseded
# in-progress run so rapid successive edits don't collide (a superseded run
# shows as "cancelled" rather than a red "failure").
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build jemdoc pages
        run: bash build.sh

      - name: Stage site files
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='_site' \
            ./ _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3   # defaults to ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
